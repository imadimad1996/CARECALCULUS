<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow circles -->
  <circle cx="1050" cy="120" r="300" fill="url(#glow)"/>
  <circle cx="150" cy="550" r="200" fill="url(#glow)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1e40af" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1e40af" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Logo icon area -->
  <g transform="translate(72, 120) scale(0.56)">
    <!-- Navy left half of cross (drawn with white for high contrast on dark background) -->
    <path d="M 50,12 L 38,12 C 37,12 36,13 36,14 L 36,36 C 36,37 35,38 34,38 L 14,38 C 13,38 12,39 12,40 L 12,46 M 12,54 L 12,60 C 12,61 13,62 14,62 L 34,62 C 35,62 36,63 36,64 L 36,86 C 36,87 37,88 38,88 L 50,88" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Teal right half of cross (bright cyan/teal) -->
    <path d="M 50,12 L 62,12 C 63,12 64,13 64,14 L 64,36 C 64,37 65,38 66,38 L 86,38 C 87,38 88,39 88,40 L 88,60 C 88,61 87,62 86,62 L 66,62 C 65,62 64,63 64,64 L 64,86 C 64,87 63,88 62,88 L 50,88" stroke="#00d2e0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Center Circle (White/Teal split) -->
    <g>
      <path d="M 50,42 A 8 8 0 0 0 50,58 Z" fill="#ffffff" />
      <path d="M 50,58 A 8 8 0 0 0 50,42 Z" fill="#00d2e0" />
      <path d="M 50,46.5 L 50,53.5 M 46.5,50 L 53.5,50" stroke="#0f172a" stroke-width="1.8" stroke-linecap="round" />
    </g>

    <!-- Pulse Line (White) -->
    <path d="M 6,50 L 16,50 L 19,42 L 23,58 L 27,38 L 31,62 L 34,46 L 38,50 L 42,50" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Connection Lines (Teal) -->
    <g stroke="#00d2e0" stroke-width="1.8" opacity="0.85" stroke-linecap="round" stroke-linejoin="round">
      <line x1="64" y1="22" x2="64" y2="38" />
      <line x1="64" y1="22" x2="58" y2="50" />
      <line x1="64" y1="38" x2="58" y2="50" />
      <line x1="64" y1="38" x2="70" y2="50" />
      <line x1="64" y1="38" x2="76" y2="38" />
      <line x1="76" y1="38" x2="70" y2="50" />
      <line x1="76" y1="38" x2="86" y2="50" />
      <line x1="86" y1="50" x2="70" y2="50" />
      <line x1="86" y1="50" x2="76" y2="62" />
      <line x1="76" y1="62" x2="70" y2="50" />
      <line x1="76" y1="62" x2="64" y2="62" />
      <line x1="64" y1="62" x2="70" y2="50" />
      <line x1="64" y1="62" x2="58" y2="50" />
      <line x1="64" y1="62" x2="64" y2="78" />
      <line x1="64" y1="78" x2="58" y2="50" />
      <line x1="58" y1="50" x2="70" y2="50" />
    </g>

